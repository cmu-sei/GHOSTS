name: "CodeQL"

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]
  schedule:
    - cron: '25 14 * * 1'

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: |
          dotnet build src/Ghosts.Domain/Ghosts.Domain.csproj
          dotnet build src/Ghosts.Api/Ghosts.Api.csproj
          dotnet build src/Ghosts.Client.Universal/Ghosts.Client.Universal.csproj
          dotnet build src/Ghosts.Client.Lite/src/Ghosts.Client.Lite.csproj
          dotnet build src/Ghosts.Animator/Ghosts.Animator.csproj

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
