
services:
  ghosts-frontend:
    build:
      context: ../Ghosts.Frontend
      dockerfile: Dockerfile
    container_name: ghosts-frontend
    ports:
      - "4200:80"
    environment:
      # API_URL must be reachable by the browser, not by Docker — use the host's address
      API_URL: ${WEB_API_URL:-http://localhost:5000/api}
      N8N_API_URL: ${WEB_N8N_API_URL:-http://localhost:5678}

  ghosts-postgres:
    image: postgres:16.8
    container_name: ghosts-postgres
    environment:
      POSTGRES_DB: ghosts
      POSTGRES_USER: ghosts
      POSTGRES_PASSWORD: scotty@1
    volumes:
      - ghosts-postgres-data:/var/lib/postgresql/data
    logging:
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghosts"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ghosts-api:
    build:
      context: ..
      dockerfile: Dockerfile-api
    container_name: ghosts-api
    depends_on:
      ghosts-postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      N8N_API_URL: ${N8N_API_URL:-http://ghosts-n8n:5678/api/v1/workflows}
      N8N_API_KEY: ${N8N_API_KEY:-replace-me}
    restart: unless-stopped

  ghosts-n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ghosts-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: unless-stopped

  ghosts-grafana:
    image: grafana/grafana
    container_name: ghosts-grafana
    depends_on:
      ghosts-postgres:
        condition: service_healthy
    user: root
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/GHOSTS-default Grafana dashboard.json
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ghosts-grafana-data:/var/lib/grafana
      - ../../configuration/grafana/datasources:/etc/grafana/provisioning/datasources
      - ../../configuration/grafana/dashboards:/etc/grafana/provisioning/dashboards

volumes:
  ghosts-postgres-data:
  ghosts-grafana-data:
