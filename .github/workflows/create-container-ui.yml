name: Create Container Frontend

on:
  workflow_dispatch:
    branches: [ main ]
  release:
    types: [ "published" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: tag_name
        run: |
          if [[ $GITHUB_EVENT_NAME == 'release' ]]; then
            echo "tag=$(echo ${GITHUB_REF#refs/tags/})" >> $GITHUB_ENV
          else
            echo "tag=latest" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          tags: |
            dustinupdyke/ghosts-frontend:${{ env.tag }}
            dustinupdyke/ghosts-frontend:latest
          push: true
          context: ./src/Ghosts.Frontend/
          file: ./src/Ghosts.Frontend/Dockerfile

      - name: Save Docker image as tar
        run: |
          docker save dustinupdyke/ghosts-frontend:latest > ghosts-frontend.tar

      - name: Upload TAR file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghosts-frontend
          path: ghosts-frontend.tar
