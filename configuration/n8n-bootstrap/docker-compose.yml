services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
    volumes:
      - n8n-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
      N8N_SECURE_COOKIE: "false"
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ../n8n-workflows:/bootstrap/workflows:ro
      - ./credentials:/bootstrap/credentials:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz && test -f /home/node/.n8n/.bootstrap_complete"]
      interval: 10s
      start_period: 30s
      retries: 30
    restart: unless-stopped

  n8n-provisioner:
    image: docker.n8n.io/n8nio/n8n:latest
    depends_on:
      n8n:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/provision-n8n.sh"]
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
      N8N_OWNER_EMAIL: ${N8N_OWNER_EMAIL:-admin@ghosts.local}
      N8N_OWNER_FIRST_NAME: ${N8N_OWNER_FIRST_NAME:-GHOSTS}
      N8N_OWNER_LAST_NAME: ${N8N_OWNER_LAST_NAME:-Admin}
      N8N_OWNER_PASSWORD: ${N8N_OWNER_PASSWORD}
    volumes:
      - n8n-data:/home/node/.n8n
      - ../n8n-workflows:/bootstrap/workflows:ro
      - ./credentials:/bootstrap/credentials:ro
      - ./scripts:/scripts:ro
    restart: "no"

volumes:
  n8n-postgres-data:
  n8n-data:
